services:
  app1:
    build: .
    env_file: .env
    ports:
      - "3001:3000"
    depends_on:
      - postgres

  app2:
    build: .
    env_file: .env
    ports:
      - "3002:3000"
    depends_on:
      - postgres

  app3:
    build: .
    env_file: .env
    ports:
      - "3003:3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    env_file: .env
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: