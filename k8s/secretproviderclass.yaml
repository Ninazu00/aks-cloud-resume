apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-keyvault-secrets
  namespace: resume
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: "6ce32427-dee7-42dc-bd34-65c3ab7ddf2f"      # managed identity client ID
    keyvaultName: "mohamedayman-kv"
    tenantId: "23db6e06-05c4-489d-b136-cba94a8e6f36"      # from the earlier error output
    objects: |
      array:
        - |
          objectName: POSTGRES-USER
          objectType: secret
        - |
          objectName: POSTGRES-PASSWORD
          objectType: secret
        - |
          objectName: POSTGRES-DB
          objectType: secret
        - |
          objectName: DATABASE-URL
          objectType: secret
  secretObjects:                                            # creates a real Kubernetes Secret from the fetched values
    - secretName: postgres-secret
      type: Opaque
      data:
        - objectName: POSTGRES-USER
          key: POSTGRES_USER
        - objectName: POSTGRES-PASSWORD
          key: POSTGRES_PASSWORD
        - objectName: POSTGRES-DB
          key: POSTGRES_DB
        - objectName: DATABASE-URL
          key: DATABASE_URL
